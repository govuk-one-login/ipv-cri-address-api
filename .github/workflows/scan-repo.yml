name: Scan repository

on:
  workflow_dispatch:
  pull_request:
  workflow_call:
  schedule:
    # Every Monday at 9am
    - cron: "0 9 * * 1"

concurrency:
  group: scan-repo-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests-ts:
    name: Collect coverage
    if: ${{ github.event_name != 'pull_request' }}
    uses: ./.github/workflows/run-unit-tests-ts.yml
    with:
      coverage-report: true

  unit-tests-java:
    name: Test coverage
    uses: ./.github/workflows/run-unit-tests-java.yml
    with:
      coverage-report: true

  sonarcloud-java:
    name: SonarCloud / Java
    needs: unit-tests-java
    runs-on: ubuntu-latest
    steps:
      - name: Pull repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: '9.6.1'

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 21
          distribution: corretto
          cache: gradle

      - name: Cache build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          key: ${{ runner.os }}-address-api-java-${{ github.head_ref || github.ref_name }}
          restore-keys: ${{ runner.os }}-address-api-java-
          path: |
            **/*/build/
            !**/*/build/jacoco
            !**/*/build/reports

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
          path: ~/.sonar/cache

      - name: Get coverage results
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ${{ needs.unit-tests-java.outputs.coverage-artifact }}

      - name: Run SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_JAVA }}
        run: ./gradlew sonar --build-cache --parallel --info

  sonarcloud-ts:
    name: SonarCloud / TypeScript
    needs: unit-tests-ts
    runs-on: ubuntu-latest
    if: ${{ success() || needs.unit-tests-ts.result == 'skipped' }}
    steps:
      - name: Run SonarCloud scan
        uses: govuk-one-login/github-actions/code-quality/sonarcloud@7bc197778553493ca4c6fb4a78caf3cfd03f8ccb
        with:
          projectBaseDir: lambdas/get-addresses
          coverage-location: lambdas/get-addresses/coverage
          sonar-token: ${{ secrets.SONAR_TOKEN_TS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-artifact: ${{ needs.unit-tests-ts.outputs.coverage-artifact || 'coverage-ts' }}
          coverage-run-id: ${{ github.event_name != 'pull_request' && github.run_id || null }}

  codeql-ts:
    name: CodeQL (TS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Run CodeQL scan
        uses: govuk-one-login/github-actions/code-quality/codeql@d201191485b645ec856a34e5ca48636cf97b2574
        with:
          languages: javascript-typescript

  codeql-java:
    name: CodeQL (Java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Pull repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: '9.6.1'

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 21
          distribution: corretto
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07 # v3.37.3
        with:
          languages: java
          build-mode: manual

      - name: Gradle build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4187e74d05793876e9989daffde9c3e66b4acd07 # v3.37.3
